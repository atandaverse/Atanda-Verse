<style>
:root{--bg:linear-gradient(135deg,#f8f9fa 0%,#e9ecef 35%,#fff 100%);--card:rgba(255,255,255,.72);--text:#1a365d;--muted:#64748b;--line:rgba(15,35,68,.1);--accent:#dc3545;--accent2:#b02a37;--shadow:rgba(15,23,42,.12);--nav:rgba(255,255,255,.74)}
[data-theme="dark"]{--bg:linear-gradient(135deg,#0f172a 0%,#1e293b 45%,#111827 100%);--card:rgba(15,23,42,.72);--text:#f8fafc;--muted:#cbd5e1;--line:rgba(255,255,255,.12);--accent:#ef4444;--accent2:#dc2626;--shadow:rgba(0,0,0,.38);--nav:rgba(15,23,42,.72)}
*{box-sizing:border-box}body{margin:0;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;overflow-x:hidden}.container{max-width:1200px;margin:0 auto;padding:0 2rem}
nav{position:sticky;top:0;z-index:10;background:var(--nav);backdrop-filter:blur(24px) saturate(170%);border-bottom:1px solid var(--line);box-shadow:0 12px 36px var(--shadow)}.nav-container{max-width:1200px;margin:0 auto;padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}.nav-logo{display:flex;align-items:center;gap:.8rem}.logo-icon{width:64px;height:64px;border-radius:19px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 26px var(--shadow);overflow:hidden}.logo-icon img{width:112%;height:112%;object-fit:contain}.logo-text{font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:2px;color:var(--text);text-decoration:none}.logo-verse{color:var(--accent)}.nav-links{display:flex;gap:1.3rem;align-items:center}.nav-links a{color:var(--text);text-decoration:none;font-weight:800;font-size:.88rem}.nav-links a.active,.nav-links a:hover{color:var(--accent)}.nav-cta{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff!important;padding:.58rem 1.1rem;border-radius:10px}
.hero{padding:5.2rem 0 3.4rem;text-align:center}.eyebrow{display:inline-flex;padding:.45rem 1.2rem;border:1px solid rgba(220,53,69,.3);border-radius:999px;color:var(--accent);font-weight:900;letter-spacing:3px;text-transform:uppercase;font-size:.75rem;background:rgba(220,53,69,.06)}h1{font-family:'Bebas Neue';font-size:clamp(3.4rem,9vw,7rem);letter-spacing:2px;line-height:.9;margin:1.2rem auto;color:var(--text)}.hero p{max-width:720px;margin:0 auto;color:var(--muted);font-size:1.12rem}.featured{margin-top:2rem;display:grid;grid-template-columns:minmax(300px,.88fr) minmax(0,1.12fr);gap:1.45rem;align-items:center;background:var(--card);border:1px solid var(--line);box-shadow:0 24px 70px var(--shadow);border-radius:28px;padding:1rem 1.25rem}.feature-copy,.event-card{background:transparent}.feature-media,.event-media{display:block;align-self:center;justify-self:center;width:100%;max-width:520px;position:relative;isolation:isolate;padding:4px;border-radius:18px;background:rgba(255,255,255,.84);box-shadow:0 10px 28px rgba(24,54,93,.14)}.feature-media::before,.event-media::before{content:"";position:absolute;inset:0;z-index:3;border-radius:inherit;padding:3px;pointer-events:none;background:conic-gradient(from var(--event-edge-angle),transparent 0 78%,rgba(66,133,244,.25) 81%,#4285f4 84%,#34a853 88%,#fbbc05 92%,#ea4335 96%,transparent 100%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;filter:drop-shadow(0 0 5px rgba(66,133,244,.82));animation:eventEdgeOrbit 4.5s linear infinite}.feature-media img,.event-media img{position:relative;z-index:1;width:100%;height:auto;max-height:390px;object-fit:contain;display:block;border-radius:13px;background:#fff;box-shadow:0 8px 22px rgba(15,23,42,.16)}@property --event-edge-angle{syntax:"<angle>";initial-value:0deg;inherits:false}@keyframes eventEdgeOrbit{to{--event-edge-angle:360deg}}.feature-copy{padding:1.1rem;text-align:left;display:flex;flex-direction:column;justify-content:center}.kind{color:var(--accent);font-size:.72rem;font-weight:900;letter-spacing:2px;text-transform:uppercase}.feature-copy h2,.event-card h3{font-family:'Bebas Neue';font-size:clamp(2rem,4vw,3.2rem);letter-spacing:1px;line-height:1;margin:.8rem 0;color:var(--text)}.meta{display:flex;gap:.8rem;flex-wrap:wrap;color:var(--muted);font-size:.9rem}.countdown{display:flex;gap:.65rem;flex-wrap:wrap;margin:1.2rem 0}.timebox{min-width:74px;background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:14px;padding:.75rem;text-align:center}.timebox strong{display:block;font-family:'Bebas Neue';font-size:2rem;color:var(--accent);line-height:1}.timebox span{font-size:.65rem;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}.btn{display:inline-flex;align-items:center;justify-content:center;align-self:flex-start;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-decoration:none;font-weight:900;letter-spacing:1px;text-transform:uppercase;border-radius:12px;padding:.9rem 1.4rem;box-shadow:0 16px 36px rgba(220,53,69,.28)}
.section{padding:3rem 0}.section-head{display:flex;align-items:end;justify-content:space-between;gap:1rem;margin-bottom:1.2rem}.section-head h2{font-family:'Bebas Neue';font-size:2.7rem;letter-spacing:1px;margin:0}.grid{display:grid;grid-template-columns:1fr;gap:1rem}.event-card{display:grid;grid-template-columns:minmax(240px,.42fr) minmax(0,1fr);align-items:center;gap:1.2rem;background:var(--card);border:1px solid var(--line);box-shadow:0 18px 52px var(--shadow);border-radius:24px;padding:1rem 1.25rem;overflow:hidden}.event-card .body{padding:.35rem 0;text-align:left;display:flex;flex-direction:column;justify-content:center}.event-card p{color:var(--muted);margin:.4rem 0 1rem}.empty{padding:2rem;border:1px dashed var(--line);border-radius:18px;color:var(--muted);text-align:center}
footer{padding:3rem 0;text-align:center;color:var(--muted)}
.featured{background:transparent;border:0;box-shadow:none;padding:0;gap:1.5rem;align-items:center}.feature-media{max-width:none;min-height:580px;background:var(--card);padding:5px;box-shadow:0 24px 70px var(--shadow)}.feature-media img{height:100%;max-height:none}.feature-copy{background:transparent;border:0;border-radius:0;padding:.8rem 0 .8rem .6rem;box-shadow:none}
.event-card{background:transparent;border:0;box-shadow:none;padding:0;gap:1.2rem;overflow:visible;align-items:center}.event-card .event-media{max-width:none;min-height:430px;background:var(--card);box-shadow:0 18px 52px var(--shadow)}.event-card .event-media img{height:100%;max-height:none}.event-card .body{background:transparent;border:0;border-radius:0;padding:.6rem 0 .6rem .4rem;box-shadow:none}
@media(max-width:780px){.nav-links{display:none}.featured,.event-card{grid-template-columns:1fr;gap:1rem}.feature-media,.event-media{max-width:100%;min-height:0!important;aspect-ratio:16/11}.feature-copy,.event-card .body{padding:.25rem .1rem 0}.countdown{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.55rem}.timebox{min-width:0;padding:.72rem .45rem}.container{padding:0 1rem}}
</style>

<body>
<nav><div class="nav-container"><div class="nav-logo"><div class="logo-icon"><img src="atanda-logo-primary.png" alt="Atanda logo"></div><a href="index.html" class="logo-text">ATANDA <span class="logo-verse">VERSE</span></a></div><div class="nav-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="sessions.html">Sessions</a><a href="events.html" class="active">Events</a><a href="blog.html">Blog</a><a href="faq.html">FAQ</a><a href="library.html">Library</a><a href="register.html" class="nav-cta">Register</a></div></div></nav>
<main>
  <section class="hero">
    <div class="container">
      <span class="eyebrow">Events & Campaigns</span>
      <h1>LIVE CLARITY MOMENTS</h1>
      <p>Campaigns, gatherings, countdowns, and focused invitations from the Atanda Verse clarity path.</p>
      <div id="featuredEvent"></div>
    </div>
  </section>
  <section class="section">
    <div class="container">
      <div class="section-head"><div><span class="eyebrow">Events</span><h2>Upcoming Experiences</h2></div></div>
      <div class="grid" id="eventsGrid"></div>
    </div>
  </section>
  <section class="section">
    <div class="container">
      <div class="section-head"><div><span class="eyebrow">Campaigns</span><h2>Current Campaigns</h2></div></div>
      <div class="grid" id="campaignsGrid"></div>
    </div>
  </section>
</main>
<footer>Atanda Verse &copy; 2025-2026</footer>
<script>
function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function absImg(url){return url||'social-preview.png';}
function fmtDate(v){if(!v)return 'Date to be announced';try{return new Date(v).toLocaleString('en-GB',{dateStyle:'medium',timeStyle:'short'});}catch{return 'Date to be announced';}}
function getUrl(item){return item.funnel_url||item.cta_url||('event-register.html?event='+encodeURIComponent(item.slug));}
function countdownHtml(item){
  if(!item.has_countdown||!item.end_date)return '';
  const diff=Math.max(0,new Date(item.end_date).getTime()-Date.now());
  const d=Math.floor(diff/86400000),h=Math.floor(diff/3600000)%24,m=Math.floor(diff/60000)%60,s=Math.floor(diff/1000)%60;
  return `<div class="countdown" data-deadline="${esc(item.end_date)}"><div class="timebox"><strong>${String(d).padStart(2,'0')}</strong><span>Days</span></div><div class="timebox"><strong>${String(h).padStart(2,'0')}</strong><span>Hours</span></div><div class="timebox"><strong>${String(m).padStart(2,'0')}</strong><span>Minutes</span></div><div class="timebox"><strong>${String(s).padStart(2,'0')}</strong><span>Seconds</span></div></div>`;
}
function tickCountdowns(){
  document.querySelectorAll('.countdown[data-deadline]').forEach(timer=>{
    const diff=Math.max(0,new Date(timer.dataset.deadline).getTime()-Date.now());
    const values=[Math.floor(diff/86400000),Math.floor(diff/3600000)%24,Math.floor(diff/60000)%60,Math.floor(diff/1000)%60];
    timer.querySelectorAll('.timebox strong').forEach((el,index)=>{el.textContent=String(values[index]||0).padStart(2,'0');});
    if(diff<=0)timer.hidden=true;
  });
}
function card(item){return `<article class="event-card"><div class="event-media"><img src="${esc(absImg(item.image_url))}" alt="${esc(item.title)}" onerror="this.src='social-preview.png'"></div><div class="body"><div class="kind">${esc(item.eyebrow||item.kind)}</div><h3>${esc(item.title)}</h3><p>${esc(item.summary)}</p><div class="meta"><span>${esc(fmtDate(item.event_date))}</span><span>${esc(item.location||'Online')}</span></div>${countdownHtml(item)}<a class="btn" href="${esc(getUrl(item))}">${esc(item.cta_label||'Learn More')}</a></div></article>`;}
async function renderEvents(){
  let items=[];
  try{items=await window.ivGetPublicEventsCampaigns();}catch(e){items=(window.ivDefaultEventsCampaigns||[]).filter(x=>x.status==='published');}
  const featured=(window.ivGetFeaturedEventCampaign&&window.ivGetFeaturedEventCampaign(items))||items[0];
  if(featured){document.getElementById('featuredEvent').innerHTML=`<div class="featured"><div class="feature-media"><img src="${esc(absImg(featured.image_url))}" alt="${esc(featured.title)}" onerror="this.src='social-preview.png'"></div><div class="feature-copy"><div class="kind">${esc(featured.eyebrow||featured.kind)}</div><h2>${esc(featured.title)}</h2><p>${esc(featured.details||featured.summary)}</p><div class="meta"><span>${esc(fmtDate(featured.event_date))}</span><span>${esc(featured.location||'Online')}</span></div>${countdownHtml(featured)}<a class="btn" href="${esc(getUrl(featured))}">${esc(featured.cta_label||'Learn More')}</a></div></div>`;}
  const events=items.filter(x=>x.kind==='event'||x.kind==='both');
  const campaigns=items.filter(x=>x.kind==='campaign'||x.kind==='both');
  document.getElementById('eventsGrid').innerHTML=events.length?events.map(card).join(''):'<div class="empty">No public events yet.</div>';
  document.getElementById('campaignsGrid').innerHTML=campaigns.length?campaigns.map(card).join(''):'<div class="empty">No public campaigns yet.</div>';
  tickCountdowns();
}
renderEvents();
setInterval(renderEvents,60000);
setInterval(tickCountdowns,1000);
</script>
</body>
