<script>!function(){var t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);document.documentElement.style.colorScheme=t==="dark"?"dark":"light"}();</script>
<script src="config.js"></script>
<link rel="icon" type="image/png" href="atanda-logo-primary.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:linear-gradient(135deg,#f8fafc 0%,#eef2f7 48%,#fff 100%);--card:rgba(255,255,255,.78);--text:#1a365d;--muted:#64748b;--line:rgba(15,35,68,.12);--accent:#dc3545;--accent2:#b02a37;--shadow:rgba(15,23,42,.14);--nav:rgba(255,255,255,.78)}
[data-theme="dark"]{--bg:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#111827 100%);--card:rgba(15,23,42,.78);--text:#f8fafc;--muted:#cbd5e1;--line:rgba(255,255,255,.12);--shadow:rgba(0,0,0,.38);--nav:rgba(15,23,42,.78)}
*{box-sizing:border-box}body{margin:0;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;min-height:100vh}.container{max-width:1140px;margin:auto;padding:0 1.2rem}
nav{position:sticky;top:0;z-index:5;background:var(--nav);backdrop-filter:blur(24px) saturate(170%);border-bottom:1px solid var(--line)}.nav-container{max-width:1180px;margin:auto;padding:.85rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}.brand{display:flex;align-items:center;gap:.85rem;text-decoration:none;color:var(--text);font-family:'Bebas Neue';font-size:1.75rem;letter-spacing:2px}.brand img{width:62px;height:62px;border-radius:18px;background:#fff;object-fit:contain;box-shadow:0 12px 26px var(--shadow)}.brand span{color:var(--accent)}.nav-links{display:flex;gap:1.1rem;align-items:center}.nav-links a{color:var(--text);text-decoration:none;font-weight:800;font-size:.88rem}.nav-links a:hover,.nav-links a.active{color:var(--accent)}
.hero{padding:4rem 0}.event-shell{display:grid;grid-template-columns:minmax(0,.95fr) minmax(340px,1.05fr);gap:1.2rem;align-items:start}.event-card,.form-card{background:var(--card);border:1px solid var(--line);border-radius:28px;box-shadow:0 24px 70px var(--shadow);overflow:hidden}.event-card img{width:100%;aspect-ratio:16/9;object-fit:contain;background:#fff;display:block}.event-copy{padding:1.7rem}.eyebrow{color:var(--accent);font-weight:900;letter-spacing:2.5px;text-transform:uppercase;font-size:.74rem}.event-copy h1{font-family:'Bebas Neue';font-size:clamp(2.7rem,6vw,5rem);letter-spacing:1.5px;line-height:.92;margin:.8rem 0}.event-copy p{color:var(--muted);margin:.5rem 0 1rem}.meta{display:flex;gap:.65rem;flex-wrap:wrap;color:var(--muted);font-size:.88rem}.pill{border:1px solid var(--line);border-radius:999px;padding:.35rem .72rem;background:rgba(255,255,255,.42)}
.form-card{padding:1.7rem}.form-card h2{font-family:'Bebas Neue';font-size:2.2rem;letter-spacing:1px;margin:0 0 .35rem}.form-note{color:var(--muted);font-size:.92rem;margin-bottom:1.1rem}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.85rem}.field{display:flex;flex-direction:column;gap:.35rem}.field.full{grid-column:1/-1}label{font-size:.76rem;font-weight:900;letter-spacing:.7px;text-transform:uppercase;color:var(--text)}input,select,textarea{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.74);color:#17233b;border-radius:14px;padding:.9rem 1rem;font:inherit;outline:none}textarea{min-height:120px;resize:vertical}[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:rgba(255,255,255,.08);color:#f8fafc}
.confirm{grid-column:1/-1;display:flex;gap:.7rem;align-items:flex-start;color:var(--muted);font-size:.9rem}.confirm input{width:auto;margin-top:.35rem}.btn{border:0;border-radius:13px;padding:1rem 1.35rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:900;text-transform:uppercase;letter-spacing:1px;cursor:pointer;box-shadow:0 16px 36px rgba(220,53,69,.26)}.btn:disabled{opacity:.55;cursor:not-allowed}.status{display:none;margin-top:1rem;border-radius:16px;padding:.9rem 1rem;font-size:.9rem}.status.ok{display:block;background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.28);color:#15803d}.status.err{display:block;background:rgba(220,53,69,.1);border:1px solid rgba(220,53,69,.28);color:var(--accent)}
footer{padding:3rem 0;text-align:center;color:var(--muted)}@media(max-width:860px){.event-shell,.grid{grid-template-columns:1fr}.nav-links{display:none}.hero{padding:2rem 0}.form-card,.event-copy{padding:1.2rem}}
</style>
</head>
<body>
<nav><div class="nav-container"><a href="index.html" class="brand"><img src="atanda-logo-primary.png" alt="Atanda logo">ATANDA <span>VERSE</span></a><div class="nav-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="sessions.html">Sessions</a><a href="events.html" class="active">Events</a><a href="blog.html">Blog</a><a href="faq.html">FAQ</a><a href="library.html">Library</a></div></div></nav>
<main class="hero">
  <div class="container event-shell">
    <article class="event-card" id="eventSummary">
      <img src="social-preview.png" alt="Atanda Verse event">
      <div class="event-copy">
        <div class="eyebrow">Atanda Verse</div>
        <h1>Loading event...</h1>
        <p>Preparing the event details.</p>
      </div>
    </article>
    <section class="form-card">
      <div class="eyebrow">Event Funnel</div>
      <h2>Reserve Your Spot</h2>
      <p class="form-note">Please check your contact details before submitting. This is what we will use for your confirmation and follow-up.</p>
      <form id="eventForm">
        <div class="grid">
          <div class="field"><label for="fullName">Full Name *</label><input id="fullName" autocomplete="name" required placeholder="Your full name"></div>
          <div class="field"><label for="email">Email Address *</label><input id="email" type="email" autocomplete="email" required placeholder="you@example.com"></div>
          <div class="field"><label for="phone">WhatsApp / Phone *</label><input id="phone" inputmode="tel" autocomplete="tel" required placeholder="+234 xxx xxx xxxx"></div>
          <div class="field"><label for="country">Country *</label><input id="country" autocomplete="country-name" required placeholder="Nigeria"></div>
          <div class="field"><label for="city">City / Time Zone</label><input id="city" placeholder="Lagos / WAT"></div>
          <div class="field"><label for="preferredContact">Preferred Contact</label><select id="preferredContact"><option>Email</option><option>WhatsApp</option><option>Phone Call</option></select></div>
          <div class="field full"><label for="note">What should we know?</label><textarea id="note" placeholder="Share what you hope to get from this event or campaign."></textarea></div>
          <label class="confirm"><input type="checkbox" id="confirmDetails" required><span>I have checked my email and phone number, and they are correct.</span></label>
        </div>
        <button class="btn" id="submitBtn" type="submit">Submit Registration</button>
        <div id="formStatus" class="status"></div>
      </form>
    </section>
  </div>
</main>
<footer>Atanda Verse &copy; 2025-2026</footer>
<script>
let currentEvent=null;
function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function qs(name){return new URLSearchParams(location.search).get(name);}
function fmtDate(v){if(!v)return 'Date to be announced';try{return new Date(v).toLocaleString('en-GB',{dateStyle:'medium',timeStyle:'short'});}catch{return 'Date to be announced';}}
function setStatus(msg,kind){const el=document.getElementById('formStatus');el.className='status '+(kind||'ok');el.textContent=msg;el.style.display='block';}
function validPhone(v){return /[0-9]{7,}/.test(String(v||'').replace(/\D/g,''));}
async function loadEvent(){
  const slug=qs('event')||qs('campaign')||'free-single-clarity-session';
  let items=[];
  try{items=await window.ivGetPublicEventsCampaigns();}catch(e){items=(window.ivDefaultEventsCampaigns||[]).filter(x=>x.status==='published');}
  currentEvent=items.find(x=>x.slug===slug||x.id===slug)||items[0]||null;
  if(!currentEvent){setStatus('This event is not available yet. Please return to the events page.', 'err');return;}
  document.title=(currentEvent.title||'Event Registration')+' - Atanda Verse';
  document.querySelector('meta[name="description"]')?.setAttribute('content',currentEvent.summary||'Register for an Atanda Verse event.');
  document.getElementById('eventSummary').innerHTML=`<img src="${esc(currentEvent.image_url||'social-preview.png')}" alt="${esc(currentEvent.title)}" onerror="this.src='social-preview.png'"><div class="event-copy"><div class="eyebrow">${esc(currentEvent.eyebrow||currentEvent.kind||'Event')}</div><h1>${esc(currentEvent.title)}</h1><p>${esc(currentEvent.details||currentEvent.summary)}</p><div class="meta"><span class="pill">${esc(fmtDate(currentEvent.event_date))}</span><span class="pill">${esc(currentEvent.location||'Online')}</span></div></div>`;
}
document.getElementById('eventForm').addEventListener('submit',async function(e){
  e.preventDefault();
  if(!currentEvent){setStatus('Event details are still loading. Please try again.', 'err');return;}
  const btn=document.getElementById('submitBtn');
  const payload={id:'event-reg-'+Date.now()+'-'+Math.random().toString(36).slice(2),event_id:currentEvent.id,event_slug:currentEvent.slug,full_name:fullName.value.trim(),email:email.value.trim(),phone:phone.value.trim(),country:country.value.trim(),city:city.value.trim(),preferred_contact:preferredContact.value,note:note.value.trim(),source:'event-register'};
  if(!payload.full_name||!payload.email||!payload.phone||!payload.country){setStatus('Please complete all required fields.', 'err');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(payload.email)){setStatus('Please enter a valid email address.', 'err');return;}
  if(!validPhone(payload.phone)){setStatus('Please enter a valid phone or WhatsApp number.', 'err');return;}
  if(!confirmDetails.checked){setStatus('Please confirm that your contact details are correct.', 'err');return;}
  btn.disabled=true;btn.textContent='Submitting...';
  try{
    const creds=window.ivGetSupabaseCreds&&window.ivGetSupabaseCreds();
    if(!creds) throw new Error('Supabase is not configured in this browser.');
    const res=await fetch(`${creds.url.replace(/\/$/,'')}/rest/v1/event_registrations`,{method:'POST',headers:{apikey:creds.key,Authorization:`Bearer ${creds.key}`,'Content-Type':'application/json',Prefer:'return=representation'},body:JSON.stringify(payload)});
    if(!res.ok) throw new Error(await res.text());
    if(window.ivNotifyAdmin){window.ivNotifyAdmin('event.registration.created',{event:currentEvent,registration:payload}).catch(()=>{});}
    setStatus('Registration received. Please watch your email or preferred contact channel for confirmation.', 'ok');
    e.target.reset();
  }catch(err){
    console.warn(err);
    setStatus('Registration could not be saved to the database. Please contact support@atanda.site or WhatsApp +2348147732687 so we can capture it manually.', 'err');
  }finally{btn.disabled=false;btn.textContent='Submit Registration';}
});
loadEvent();
</script>
</body>
</html>
