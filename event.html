<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Event Details - Atanda Verse</title>
<meta name="description" content="View full details for an Atanda Verse event or campaign.">
<meta name="robots" content="index,follow,max-image-preview:large">
<meta name="theme-color" content="#1a365d">
<script>!function(){var t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t)}();</script>
<script src="config.js"></script>
<link rel="icon" href="atanda-logo-primary.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#eef2f7;--surface:rgba(255,255,255,.78);--text:#19385f;--soft:#607089;--line:rgba(20,50,90,.11);--accent:#d92f43;--shadow:rgba(20,35,60,.14)}
[data-theme="dark"]{--bg:#101827;--surface:rgba(24,35,55,.84);--text:#f5f7fb;--soft:#b5c0d0;--line:rgba(255,255,255,.11);--shadow:rgba(0,0,0,.38)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}.container{width:min(1180px,calc(100% - 2rem));margin:auto}
nav{border-bottom:1px solid var(--line);background:var(--surface);backdrop-filter:blur(22px);position:sticky;top:0;z-index:5}.nav{min-height:82px;display:flex;align-items:center;justify-content:space-between;gap:1rem}.brand{display:flex;align-items:center;gap:.75rem;color:var(--text);text-decoration:none;font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:2px}.brand img{width:54px;height:54px;object-fit:contain;background:#fff;border-radius:15px}.back{color:var(--accent);font-weight:800;text-decoration:none}
main{padding:3.5rem 0 5rem}.detail-grid{display:grid;grid-template-columns:minmax(380px,.95fr) minmax(0,1.05fr);gap:1.5rem;align-items:stretch}.media,.copy{background:var(--surface);border:1px solid var(--line);border-radius:24px;box-shadow:0 22px 64px var(--shadow)}.media{padding:5px;position:relative;isolation:isolate;min-height:620px}.media::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:3px;background:conic-gradient(from var(--angle),transparent 0 78%,#4285f4 84%,#34a853 89%,#fbbc05 94%,#ea4335 98%,transparent 100%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:orbit 4.5s linear infinite;z-index:2;pointer-events:none}@property --angle{syntax:"<angle>";initial-value:0deg;inherits:false}@keyframes orbit{to{--angle:360deg}}.media img{width:100%;height:100%;object-fit:contain;border-radius:20px;background:#fff;display:block}.copy{padding:clamp(1.5rem,4vw,3.2rem);display:flex;flex-direction:column;justify-content:center}.kind{color:var(--accent);font-size:.76rem;font-weight:900;letter-spacing:2.5px;text-transform:uppercase}.copy h1{font-family:'Bebas Neue';font-size:clamp(3rem,7vw,5.7rem);line-height:.92;letter-spacing:1px;margin:.7rem 0 1rem}.summary{font-size:1.12rem;color:var(--soft);line-height:1.75}.details{color:var(--soft);line-height:1.8;white-space:pre-line}.meta{display:flex;gap:1rem;flex-wrap:wrap;font-weight:700;margin:1rem 0;color:var(--soft)}.countdown{display:flex;gap:.6rem;flex-wrap:wrap;margin:1.2rem 0}.time{min-width:76px;text-align:center;padding:.75rem;background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:12px}.time strong{display:block;font-family:'Bebas Neue';font-size:2rem;color:var(--accent)}.time span{font-size:.64rem;text-transform:uppercase;font-weight:800}.cta{align-self:flex-start;background:var(--accent);color:#fff;text-decoration:none;font-weight:900;text-transform:uppercase;padding:1rem 1.4rem;border-radius:11px;margin-top:1rem}
@media(max-width:820px){.detail-grid{grid-template-columns:1fr}.media{min-height:0;aspect-ratio:4/5}.copy{padding:1.4rem}.nav{min-height:70px}}
</style>
</head>
<body>
<nav><div class="container nav"><a class="brand" href="index.html"><img src="atanda-logo-primary.png" alt="">ATANDA VERSE</a><a class="back" href="events.html">All events</a></div></nav>
<main><div class="container"><div class="detail-grid" id="eventDetail"><p>Loading event details...</p></div></div></main>
<footer></footer>
<script>
function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(v){if(!v)return'Date to be announced';return new Date(v).toLocaleString('en-GB',{dateStyle:'long',timeStyle:'short'});}
function countdown(item){if(!item.has_countdown||!item.end_date)return'';return `<div class="countdown" data-deadline="${esc(item.end_date)}">${['Days','Hours','Minutes','Seconds'].map(x=>`<div class="time"><strong>00</strong><span>${x}</span></div>`).join('')}</div>`;}
function tick(){document.querySelectorAll('.countdown').forEach(el=>{const d=Math.max(0,new Date(el.dataset.deadline)-Date.now()),v=[Math.floor(d/86400000),Math.floor(d/3600000)%24,Math.floor(d/60000)%60,Math.floor(d/1000)%60];el.querySelectorAll('strong').forEach((n,i)=>n.textContent=String(v[i]).padStart(2,'0'));if(!d)el.hidden=true;});}
(async function(){const key=new URLSearchParams(location.search).get('event');const items=await window.ivGetPublicEventsCampaigns();const item=items.find(x=>x.slug===key||String(x.id)===key);const host=document.getElementById('eventDetail');if(!item){host.innerHTML='<div class="copy"><h1>Event not found</h1><p class="summary">This event may no longer be public.</p><a class="cta" href="events.html">View current events</a></div>';return;}document.title=item.title+' - Atanda Verse';const url=item.funnel_url||item.cta_url||('event-register.html?event='+encodeURIComponent(item.slug));host.innerHTML=`<div class="media"><img src="${esc(item.image_url||'social-preview.png')}" alt="${esc(item.title)}"></div><article class="copy"><div class="kind">${esc(item.eyebrow||item.kind)}</div><h1>${esc(item.title)}</h1><p class="summary">${esc(item.summary)}</p><div class="meta"><span>${esc(fmt(item.event_date))}</span><span>${esc(item.location||'Online')}</span></div>${countdown(item)}<p class="details">${esc(item.details||'')}</p><a class="cta" href="${esc(url)}">${esc(item.cta_label||'Register')}</a></article>`;tick();setInterval(tick,1000);})();
</script>
</body>
</html>
